<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Festival Poster Generator</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.header{
background:#ff6a00;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.poster-preview{
position:relative;
}

.poster-preview img{
width:100%;
border-radius:10px;
}

#previewName{
position:absolute;
left:180px;
top:520px;
font-weight:bold;
color:black;
font-size:18px;
}

#previewNumber{
position:absolute;
left:180px;
top:560px;
font-weight:bold;
color:black;
font-size:18px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#ff6a00;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

.footer{
text-align:center;
margin-top:20px;
padding:10px;
color:#777;
}

</style>

</head>

<body>

<div class="header">
शुभ लाभ बप्पा - Festival Poster Generator
</div>

<div class="container">

<div class="poster-preview">

<img src="poster-preview.png">

<div id="previewName">नाम</div>
<div id="previewNumber">मोबाइल नंबर</div>

</div>

<form action="/generate" method="POST" enctype="multipart/form-data">

<input type="text" id="nameInput" name="name" placeholder="अपना नाम लिखें" required>

<input type="text" id="numberInput" name="number" placeholder="मोबाइल नंबर" required>

<input type="file" name="photo" accept="image/*" required>

<button type="submit">पोस्टर बनाएं</button>

</form>

</div>

<div class="footer">
Powered by Shubh Labh Bappa
</div>

<script>

const nameInput = document.getElementById("nameInput");
const numberInput = document.getElementById("numberInput");

const previewName = document.getElementById("previewName");
const previewNumber = document.getElementById("previewNumber");

nameInput.addEventListener("input",function(){

if(this.value===""){
previewName.innerText="नाम";
}else{
previewName.innerText=this.value;
}

});

numberInput.addEventListener("input",function(){

if(this.value===""){
previewNumber.innerText="मोबाइल नंबर";
}else{
previewNumber.innerText=this.value;
}

});

</script>

</body>

</html>
