<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shubh Labh Poster Generator</title>

<link
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"
rel="stylesheet"
/>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.header{
background:#ff6a00;
color:white;
padding:20px;
text-align:center;
font-size:22px;
}

.container{
max-width:450px;
margin:auto;
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
}

img{
max-width:100%;
}

button{
width:100%;
padding:12px;
background:#ff6a00;
border:none;
color:white;
font-size:16px;
border-radius:5px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">
Shubh Labh Poster Generator
</div>

<div class="container">

<form id="form" method="POST" action="/generate" enctype="multipart/form-data">

<input type="text" name="name" placeholder="Enter Name" required>

<input type="text" name="number" placeholder="Mobile Number" required>

<input type="file" id="photoInput" name="photo" accept="image/*" required>

<br><br>

<img id="preview">

<button type="submit">Generate Poster</button>

</form>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>

let cropper;

const input = document.getElementById("photoInput");
const preview = document.getElementById("preview");

input.onchange = (e) => {

const file = e.target.files[0];

const url = URL.createObjectURL(file);

preview.src = url;

if(cropper){
cropper.destroy();
}

cropper = new Cropper(preview,{
aspectRatio:245/342,
viewMode:1,
zoomable:true,
scalable:true
});

};

</script>

</body>
</html>
