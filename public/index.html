<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Poster Generator</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.header{
display:flex;
justify-content:space-between;
background:#ff6a00;
color:white;
padding:12px;
font-weight:bold;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.poster{
position:relative;
}

.poster img{
width:100%;
}

#photoPreview{
position:absolute;
left:7%;
top:43%;
width:23%;
height:25%;
object-fit:cover;
}

#namePreview{
position:absolute;
left:10%;
top:74%;
font-weight:bold;
font-size:18px;
}

#numberPreview{
position:absolute;
left:10%;
top:80%;
font-weight:bold;
font-size:18px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#ff6a00;
color:white;
border:none;
}

.yt{
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">

<div>Ganpati Studio</div>

<div>Shubh Labh Bappa</div>

</div>

<div class="container">

<div class="poster">

<img src="poster-preview.png">

<img id="photoPreview">

<div id="namePreview">Your Name</div>

<div id="numberPreview">Mobile Number</div>

</div>

<form id="form">

<input type="text" id="name" placeholder="Enter your name">

<input type="text" id="number" placeholder="Enter mobile number">

<input type="file" id="photo" accept="image/*">

<button type="button" onclick="generate()">Generate Poster</button>

</form>

<div class="yt">

<a href="https://youtube.com/@YOURCHANNEL" target="_blank">

Visit our YouTube Channel

</a>

</div>

</div>

<script>

const nameInput=document.getElementById("name");
const numberInput=document.getElementById("number");
const photoInput=document.getElementById("photo");

const namePreview=document.getElementById("namePreview");
const numberPreview=document.getElementById("numberPreview");
const photoPreview=document.getElementById("photoPreview");

nameInput.oninput=()=>{
namePreview.innerText=nameInput.value || "Your Name";
}

numberInput.oninput=()=>{
numberPreview.innerText=numberInput.value || "Mobile Number";
}

photoInput.onchange=function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){
photoPreview.src=e.target.result;
}

reader.readAsDataURL(file);

}

}

function generate(){

alert("Poster preview ready. Take screenshot or download coming soon.");

}

</script>

</body>

</html>
