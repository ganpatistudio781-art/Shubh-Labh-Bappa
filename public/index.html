<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubh Labh Poster Generator</title>
<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  margin: 0;
  padding: 0;
}
.container {
  max-width: 450px;
  width: 95%;
  margin: auto;
  background: white;
  padding: 20px;
  margin-top: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  text-align: center;
}
.poster-preview {
  width:100%;
  max-width:350px;
  height:auto;
  border-radius:10px;
  margin-bottom:10px;
  border:1px solid #ccc;
}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:5px;
  box-sizing: border-box;
}
button{
  width:100%;
  padding:12px;
  background:#ff6a00;
  border:none;
  color:white;
  font-size:16px;
  border-radius:5px;
  cursor:pointer;
  margin-top:10px;
}
.ytBox{
  text-align:center;
  margin-top:15px;
}
.ytBtn{
  display:inline-block;
  background:red;
  color:white;
  padding:12px 18px;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}
.footer{
  text-align:center;
  margin-top:20px;
  color:#666;
  font-size:14px;
}
</style>
</head>
<body>

<div class="container">
<h2>Shubh Labh Poster Generator</h2>

<canvas id="posterCanvas" class="poster-preview"></canvas>

<input type="text" id="nameInput" placeholder="Enter Your Name" required>
<input type="text" id="numberInput" placeholder="Mobile Number" required>
<input type="file" id="photoInput" accept="image/*">

<button id="downloadBtn">Generate & Download Poster</button>

<div class="ytBox">
<a href="https://youtube.com/@YOURCHANNEL" target="_blank" class="ytBtn">
▶ Visit Our YouTube Channel
</a>
</div>

<div class="footer">
Powered by Shubh Labh Bappa
</div>
</div>

<script>
const canvas = document.getElementById("posterCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 1080;
canvas.height = 1350;

const baseImage = new Image();
baseImage.src = "poster-preview.png";

const nameInput = document.getElementById("nameInput");
const numberInput = document.getElementById("numberInput");
const photoInput = document.getElementById("photoInput");
let userPhoto = new Image();

// Coordinates & frame size
const photoFrame = {x:78, y:580, width:245, height:342};
const nameCoord = {x:112, y:1006};
const numberCoord = {x:112, y:1080};

function drawPoster(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(baseImage,0,0,canvas.width,canvas.height);

  if(userPhoto.src){
    // Auto-fit photo in frame
    let scale = Math.max(photoFrame.width / userPhoto.width, photoFrame.height / userPhoto.height);
    let w = userPhoto.width * scale;
    let h = userPhoto.height * scale;
    let x = photoFrame.x - (w - photoFrame.width)/2;
    let y = photoFrame.y - (h - photoFrame.height)/2;

    ctx.drawImage(userPhoto, x, y, w, h);
  }

  ctx.font = "bold 40px Arial";
  ctx.fillStyle = "black";
  ctx.fillText(nameInput.value, nameCoord.x, nameCoord.y);
  ctx.fillText(numberInput.value, numberCoord.x, numberCoord.y);
}

// Event listeners
photoInput.addEventListener("change", function(e){
  const file = e.target.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(evt){
      userPhoto.src = evt.target.result;
      userPhoto.onload = drawPoster;
    }
    reader.readAsDataURL(file);
  }
});

nameInput.addEventListener("input", drawPoster);
numberInput.addEventListener("input", drawPoster);
baseImage.onload = drawPoster;

// Download
document.getElementById("downloadBtn").addEventListener("click", function(){
  const link = document.createElement("a");
  link.download = "poster.png";
  link.href = canvas.toDataURL();
  link.click();
});
</script>

</body>
</html>
