<!DOCTYPE html>
<html lang="hi">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festival Poster Generator</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
background:#ff6a00;
color:white;
padding:12px 15px;
font-weight:bold;
font-size:18px;
}

/* CONTAINER */

.container{
max-width:420px;
margin:auto;
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* POSTER PREVIEW */

.poster-preview{
position:relative;
width:100%;
}

.poster-preview img{
width:100%;
display:block;
border-radius:10px;
}

/* PHOTO PREVIEW */

#photoPreview{
position:absolute;
left:6%;
top:42%;
width:32%;
height:20%;
object-fit:cover;
border-radius:6px;
display:none;
}

/* NAME PREVIEW */

#previewName{
position:absolute;
left:32%;
top:73%;
transform:translateX(-50%);
font-weight:bold;
font-size:18px;
color:black;
}

/* NUMBER PREVIEW */

#previewNumber{
position:absolute;
left:40%;
top:78%;
transform:translateX(-50%);
font-weight:bold;
font-size:18px;
color:black;
}

/* INPUTS */

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

/* BUTTON */

button{
width:100%;
padding:12px;
background:#ff6a00;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

/* ZOOM SLIDER */

.slider{
width:100%;
margin:10px 0;
}

/* FOOTER */

.footer{
text-align:center;
margin-top:20px;
padding:10px;
color:#777;
font-size:14px;
}

</style>

</head>

<body>

<div class="header">
<div>Ganpati Studio</div>
<div>Shubh Labh Bappa</div>
</div>

<div class="container">

<div class="poster-preview">

<img src="poster-preview.png">

<img id="photoPreview">

<div id="previewName">नाम</div>
<div id="previewNumber">मोबाइल नंबर</div>

</div>

<form action="/generate" method="POST" enctype="multipart/form-data">

<input type="text" id="nameInput" name="name" placeholder="अपना नाम लिखें" required>

<input type="text" id="numberInput" name="number" placeholder="मोबाइल नंबर" required>

<input type="file" id="photoInput" name="photo" accept="image/*" required>

<label>फोटो Zoom</label>
<input type="range" min="1" max="2" step="0.1" value="1" id="zoomSlider" class="slider">

<button type="submit">पोस्टर बनाएं</button>

</form>

</div>

<div class="footer">
Powered by Shubh Labh Bappa
</div>

<script>

/* NAME LIVE PREVIEW */

const nameInput = document.getElementById("nameInput");
const previewName = document.getElementById("previewName");

nameInput.addEventListener("input",function(){

if(this.value===""){
previewName.innerText="नाम";
}else{
previewName.innerText=this.value;
}

});

/* NUMBER LIVE PREVIEW */

const numberInput = document.getElementById("numberInput");
const previewNumber = document.getElementById("previewNumber");

numberInput.addEventListener("input",function(){

if(this.value===""){
previewNumber.innerText="मोबाइल नंबर";
}else{
previewNumber.innerText=this.value;
}

});

/* PHOTO PREVIEW */

const photoInput=document.getElementById("photoInput");
const photoPreview=document.getElementById("photoPreview");

photoInput.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

photoPreview.src=e.target.result;
photoPreview.style.display="block";

}

reader.readAsDataURL(file);

}

});

/* PHOTO ZOOM */

const zoomSlider=document.getElementById("zoomSlider");

zoomSlider.addEventListener("input",function(){

photoPreview.style.transform="scale("+this.value+")";

});

</script>

</body>
</html>
