<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="preload" as="image" href="poster-preview.png">

<title>Festival Poster Maker</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"/>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.header{
display:flex;
justify-content:space-between;
background:#ff6a00;
color:white;
padding:12px;
font-weight:bold;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:15px;
border-radius:10px;
margin-top:10px;
}

.poster-preview{
position:relative;
}

.poster-preview img{
width:100%;
}

#photoPreview{
position:absolute;
left:7.2%;
top:42.9%;
width:22.7%;
height:25.3%;
object-fit:cover;
}

#previewName{
position:absolute;
left:10.4%;
top:74.5%;
font-weight:bold;
}

#previewNumber{
position:absolute;
left:10.4%;
top:80%;
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#ff6a00;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="header">

<div>Ganpati Studio</div>

<div>Shubh Labh Bappa</div>

</div>

<div class="container">

<div class="poster-preview">

<img src="poster-preview.png" loading="eager">

<img id="photoPreview">

<div id="previewName">नाम</div>

<div id="previewNumber">मोबाइल नंबर</div>

</div>

<form action="/generate" method="POST" enctype="multipart/form-data">

<input type="text" name="name" id="nameInput" placeholder="नाम">

<input type="text" name="number" id="numberInput" placeholder="मोबाइल नंबर">

<input type="file" id="fileInput" name="photo" accept="image/*">

<button type="submit">पोस्टर बनाएं</button>

</form>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>

nameInput.oninput=()=>{
previewName.innerText=nameInput.value||"नाम";
}

numberInput.oninput=()=>{
previewNumber.innerText=numberInput.value||"मोबाइल नंबर";
}

const photoInput=document.getElementById("fileInput");
const photoPreview=document.getElementById("photoPreview");

photoInput.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

photoPreview.src=e.target.result;

}

reader.readAsDataURL(file);

}

});

</script>

</body>

</html>
