<!DOCTYPE html>
<html lang="hi">

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Festival Poster Generator</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.header{
display:flex;
justify-content:space-between;
background:#ff6a00;
color:white;
padding:12px;
font-weight:bold;
}

.container{
max-width:420px;
margin:auto;
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.poster-preview{
position:relative;
width:100%;
}

.poster-preview img{
width:100%;
display:block;
}

/* PHOTO */

#photoPreview{
position:absolute;

left:7.2%;
top:42.9%;

width:22.7%;
height:25.3%;

object-fit:cover;
}

/* NAME */

#previewName{
position:absolute;

left:10.3%;
top:74.5%;

font-size:18px;
font-weight:bold;
color:black;
}

/* NUMBER */

#previewNumber{
position:absolute;

left:10.3%;
top:80%;

font-size:18px;
font-weight:bold;
color:black;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#ff6a00;
border:none;
color:white;
font-size:16px;
border-radius:5px;
}

.footer{
text-align:center;
margin-top:20px;
color:#777;
}

</style>

</head>

<body>

<div class="header">

<div>Ganpati Studio</div>

<div>Shubh Labh Bappa</div>

</div>

<div class="container">

<div class="poster-preview">

<img src="poster-preview.png">

<img id="photoPreview">

<div id="previewName">नाम</div>

<div id="previewNumber">मोबाइल नंबर</div>

</div>

<form action="/generate" method="POST" enctype="multipart/form-data">

<input type="text" id="nameInput" name="name" placeholder="अपना नाम लिखें" required>

<input type="text" id="numberInput" name="number" placeholder="मोबाइल नंबर" required>

<input type="file" id="photoInput" name="photo" accept="image/*" required>

<button type="submit">पोस्टर बनाएं</button>

</form>

</div>

<div class="footer">
Powered by Shubh Labh Bappa
</div>

<script>

/* NAME PREVIEW */

const nameInput=document.getElementById("nameInput");
const previewName=document.getElementById("previewName");

nameInput.addEventListener("input",function(){

previewName.innerText=this.value||"नाम";

});

/* NUMBER PREVIEW */

const numberInput=document.getElementById("numberInput");
const previewNumber=document.getElementById("previewNumber");

numberInput.addEventListener("input",function(){

previewNumber.innerText=this.value||"मोबाइल नंबर";

});

/* PHOTO PREVIEW */

const photoInput=document.getElementById("photoInput");
const photoPreview=document.getElementById("photoPreview");

photoInput.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

photoPreview.src=e.target.result;

}

reader.readAsDataURL(file);

}

});

</script>

</body>

</html>
