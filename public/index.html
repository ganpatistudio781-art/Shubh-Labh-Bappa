<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ganpati Poster Generator</title>
<style>
    body { font-family: Arial; margin:0; padding:0; text-align:center; background:#fff; }
    header, footer { background:#f8f8f8; padding:10px; display:flex; justify-content:space-between; align-items:center; flex-wrap: wrap; }
    header h2, header h3, header h4 { margin:0; font-size:14px; }
    .container { max-width:360px; margin:20px auto; padding:10px; }
    input, button { width:100%; padding:10px; margin:8px 0; font-size:16px; }
    button { background:red; color:white; border:none; cursor:pointer; }
    button:hover { opacity:0.8; }
    #preview { margin-top:20px; width:100%; height:auto; border:1px solid #ccc; }
</style>
</head>
<body>

<header>
    <h2>Ganpati Studio</h2>
    <h3>Shubh Labh Poster Preview</h3>
    <h4>Shubh Labh Bappa</h4>
</header>

<div class="container">
    <input type="text" id="name" placeholder="Enter Name" required>
    <input type="text" id="mobile" placeholder="Enter Mobile Number" required>
    <input type="file" id="photo" accept="image/*" capture="user" required>
    <button id="generateBtn">Generate Ganpati Poster</button>
    
    <img id="preview" src="poster-preview.png" alt="Poster Preview">
</div>

<footer>
    <span>Powered by Shubh Labh Bappa</span>
    <a href="https://youtube.com/@ganpati_shubhlabh23?si=EIVGRNugp3gW044P" target="_blank">
        <button style="background:red;">YouTube Channel</button>
    </a>
</footer>

<script>
document.getElementById('generateBtn').addEventListener('click', async () => {
    const name = document.getElementById('name').value.trim();
    const mobile = document.getElementById('mobile').value.trim();
    const photo = document.getElementById('photo').files[0];

    if(!name || !mobile || !photo) return alert('All fields are required!');

    const formData = new FormData();
    formData.append('name', name);
    formData.append('mobile', mobile);
    formData.append('photo', photo);

    try {
        const res = await fetch('/generate', { method:'POST', body:formData });
        const data = await res.json();
        if(data.poster){
            document.getElementById('preview').src = data.poster;
            
            // Auto download
            const a = document.createElement('a');
            a.href = data.poster;
            a.download = 'GanpatiPoster.png';
            document.body.appendChild(a);
            a.click();
            a.remove();
        } else alert('Error generating poster!');
    } catch(err) {
        alert('Something went wrong!');
        console.error(err);
    }
});
</script>

</body>
</html>
